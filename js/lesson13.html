<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 13</title>
</head>
<body>
    <script>
        const namePerson = prompt("Digite seu nome")
        document.body.innerHTML += `Seu nome é: <strong>${namePerson}</strong><br />`
        document.body.innerHTML += `Seu nome tem <strong>${namePerson.length}</strong><br />`
        document.body.innerHTML += `A segunda letra do seu nome é: ${namePerson[1]}`
    </script>
</body>
</html>
